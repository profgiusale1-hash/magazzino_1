<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magazzino Filamenti 3D Cloud</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #1a3a5a; text-align: center; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        /* Form Styling */
        .form-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 30px; padding: 20px; background: #f8f9fa; border-radius: 8px; border: 1px solid #e9ecef; }
        input, select, button { padding: 12px; border: 1px solid #ced4da; border-radius: 6px; font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 2px rgba(52,152,219,0.2); }
        
        button { cursor: pointer; background-color: #27ae60; color: white; border: none; font-weight: 600; transition: all 0.3s; }
        button:hover { background-color: #219150; transform: translateY(-1px); }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }

        /* Table Styling */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #edf2f7; }
        th { background-color: #1a3a5a; color: white; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        tr:hover { background-color: #f8fbfd; }

        /* Material Badges */
        .badge { padding: 5px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; color: white; display: inline-block; text-transform: uppercase; }
        .pla { background: #3498db; }
        .abs { background: #e67e22; }
        .petg { background: #9b59b6; }
        .tpu { background: #1abc9c; }
        .asa { background: #d35400; }
        
        #loading { text-align: center; padding: 20px; font-style: italic; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Magazzino Filamenti Cloud</h1>

    <div class="form-group" id="inputForm">
        <select id="tipo">
            <option value="PLA">PLA</option>
            <option value="ABS">ABS</option>
            <option value="PETG">PETG</option>
            <option value="TPU">TPU</option>
            <option value="ASA">ASA</option>
        </select>
        <input type="text" id="colore" placeholder="Colore">
        <input type="text" id="fornitore" placeholder="Fornitore">
        <input type="date" id="dataAcquisto">
        <input type="number" id="prezzo" placeholder="Prezzo (€)" step="0.01">
        <button id="addBtn" onclick="aggiungiBobina()">Aggiungi</button>
    </div>

    <div id="loading">Caricamento inventario in corso...</div>

    <div class="table-container">
        <table id="tabellaMagazzino" style="display: none;">
            <thead>
                <tr>
                    <th>Materiale</th>
                    <th>Colore</th>
                    <th>Fornitore</th>
                    <th>Data</th>
                    <th>Prezzo</th>
                </tr>
            </thead>
            <tbody id="corpoTabella">
                </tbody>
        </table>
    </div>
</div>

<script>
    // --- CONFIGURAZIONE ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyrojF8TEOsRGAaw-FZV9cRnPKkywg8It6y2ruMJ6ICqB-Arfp8sifesqnkS9mSp_9idA/exec"; 
    // ----------------------

    async function caricaDati() {
        const loading = document.getElementById('loading');
        const tabella = document.getElementById('tabellaMagazzino');
        const corpo = document.getElementById('corpoTabella');

        try {
            const response = await fetch(SCRIPT_URL);
            const dati = await response.json();
            
            corpo.innerHTML = '';
            dati.forEach(item => {
                const row = `<tr>
                    <td><span class="badge ${item.tipo.toLowerCase()}">${item.tipo}</span></td>
                    <td>${item.colore}</td>
                    <td>${item.fornitore}</td>
                    <td>${formattaData(item.data)}</td>
                    <td>€ ${parseFloat(item.prezzo).toFixed(2)}</td>
                </tr>`;
                corpo.innerHTML += row;
            });

            loading.style.display = 'none';
            tabella.style.display = 'table';
        } catch (error) {
            loading.innerHTML = "❌ Errore nel caricamento. Controlla l'URL dello script.";
            console.error(error);
        }
    }

    async function aggiungiBobina() {
        const btn = document.getElementById('addBtn');
        const dati = {
            tipo: document.getElementById('tipo').value,
            colore: document.getElementById('colore').value,
            fornitore: document.getElementById('fornitore').value,
            data: document.getElementById('dataAcquisto').value,
            prezzo: document.getElementById('prezzo').value
        };

        if (!dati.colore || !dati.data || !dati.prezzo) {
            alert("Per favore, compila tutti i campi!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Salvataggio...";

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", // Necessario per Google Apps Script
                body: JSON.stringify(dati),
                headers: { "Content-Type": "application/json" }
            });
            
            // Pulizia e ricarica
            alert("Bobina aggiunta correttamente!");
            location.reload();
        } catch (error) {
            alert("Errore durante il salvataggio.");
            btn.disabled = false;
            btn.innerText = "Aggiungi";
        }
    }

    function formattaData(dataStr) {
        if(!dataStr) return "-";
        const d = new Date(dataStr);
        return isNaN(d) ? dataStr : d.toLocaleDateString('it-IT');
    }

    // Avvio caricamento
    if (SCRIPT_URL === "INSERISCI_QUI_IL_TUO_URL_DI_GOOGLE") {
        document.getElementById('loading').innerHTML = "⚠️ Configurazione incompleta: inserisci l'URL di Google Script nel codice.";
    } else {
        caricaDati();
    }
</script>

</body>
</html>
